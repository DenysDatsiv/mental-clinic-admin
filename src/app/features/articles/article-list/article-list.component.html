<div class="page">
  <p-toast />
  <p-confirmDialog />

  <div class="page-header">
    <h2>Статті</h2>
    <p-button label="Нова стаття" icon="pi pi-plus" (onClick)="create()" />
  </div>

  <div class="search-bar">
    <i class="pi pi-search search-icon"></i>
    <input pInputText [ngModel]="search()" (ngModelChange)="search.set($event)"
           placeholder="Пошук статей…" class="search-input" />
  </div>

  <p-table [value]="articles()" [loading]="loading()" [paginator]="true" [rows]="10"
           styleClass="p-datatable-sm" responsiveLayout="scroll">
    <ng-template pTemplate="header">
      <tr>
        <th>Заголовок</th>
        <th>Категорії</th>
        <th>Статус</th>
        <th>Автор</th>
        <th>Опубліковано</th>
        <th style="width:120px"></th>
      </tr>
    </ng-template>
    <ng-template pTemplate="loadingbody">
      @for (r of [1,2,3,4,5,6,7,8]; track r) {
        <tr>
          <td><p-skeleton height="1.4rem" /></td>
          <td><p-skeleton height="1.4rem" width="120px" /></td>
          <td><p-skeleton height="1.4rem" width="90px" /></td>
          <td><p-skeleton height="1.4rem" width="100px" /></td>
          <td><p-skeleton height="1.4rem" width="90px" /></td>
          <td><p-skeleton height="1.4rem" width="80px" /></td>
        </tr>
      }
    </ng-template>
    <ng-template pTemplate="body" let-a>
      <tr>
        <td>{{ a.title }}</td>
        <td>{{ a.categories?.join(', ') || '—' }}</td>
        <td><p-tag [value]="statusLabel(a.status)" [severity]="statusSeverity(a.status)" /></td>
        <td>{{ a.authorName || a.author?.name || '—' }}</td>
        <td>{{ a.publishedAt ? (a.publishedAt | date:'mediumDate':'':'uk') : '—' }}</td>
        <td>
          <div class="row-actions">
            <p-button icon="pi pi-pencil" [text]="true" severity="secondary" (onClick)="edit(a._id)" />
            <p-button icon="pi pi-trash"  [text]="true" severity="danger"    (onClick)="delete(a)" />
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr><td colspan="6" class="empty">Статей не знайдено.</td></tr>
    </ng-template>
  </p-table>
</div>
